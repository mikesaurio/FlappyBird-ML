engine_settings:
  time_scale: 30
  target_frame_rate: -1
  capture_frame_rate: 60

behaviors:
  FlappyAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 1.0e-4
      beta: 1.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 2
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 10000